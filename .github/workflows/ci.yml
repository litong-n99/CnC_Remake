name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: remake/package-lock.json

      - name: Install dependencies
        working-directory: remake
        run: npm ci

      - name: Run TypeScript type check
        working-directory: remake
        run: npm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: remake/package-lock.json

      - name: Install dependencies
        working-directory: remake
        run: npm ci

      - name: Run ESLint
        working-directory: remake
        run: npm run lint

      - name: Run Prettier format check
        working-directory: remake
        run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: remake/package-lock.json

      - name: Install dependencies
        working-directory: remake
        run: npm ci

      - name: Build project
        working-directory: remake
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: remake/dist/
          retention-days: 7
